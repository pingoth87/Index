<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HELLWEAR — Acceder</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="hw-style.css"/>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; position: relative; overflow: hidden;
    }
    .auth-wrap::before {
      content: '⛧';
      position: fixed; font-size: 600px;
      color: rgba(150,15,15,0.035);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none; animation: spin-slow 80s linear infinite;
      z-index: 0;
    }
    @keyframes spin-slow { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .auth-card {
      width: 100%; max-width: 460px;
      background: var(--panel);
      border: 1px solid var(--border);
      position: relative; z-index: 1;
    }

    /* esquinas */
    .auth-card::before, .auth-card::after,
    .auth-corner-br, .auth-corner-bl {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: var(--red); border-style: solid;
    }
    .auth-card::before  { top:-1px;    left:-1px;   border-width:2px 0 0 2px; }
    .auth-card::after   { top:-1px;    right:-1px;  border-width:2px 2px 0 0; }
    .auth-corner-br     { bottom:-1px; right:-1px;  border-width:0 2px 2px 0; }
    .auth-corner-bl     { bottom:-1px; left:-1px;   border-width:0 0 2px 2px; }

    .auth-header {
      text-align: center; padding: 2.5rem 2.5rem 0;
    }
    .auth-logo {
      font-family: var(--title); font-size: 2rem;
      letter-spacing: 0.12em; margin-bottom: 0.5rem;
    }
    .auth-logo span { color: var(--red-lit); }

    /* Tabs */
    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
      margin-top: 1.5rem;
    }
    .auth-tab {
      padding: 14px;
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.2em; text-transform: uppercase;
      text-align: center; cursor: pointer;
      color: var(--muted); transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .auth-tab.active { color: var(--white); border-bottom-color: var(--red-lit); }
    .auth-tab:hover:not(.active) { color: var(--white); background: rgba(255,255,255,0.02); }

    /* Forms */
    .auth-form { padding: 2rem 2.5rem 2.5rem; display: none; }
    .auth-form.active { display: block; }

    .auth-field { margin-bottom: 1.25rem; }
    .auth-label {
      display: block; font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
      margin-bottom: 7px;
    }
    .auth-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); color: var(--white);
      font-family: var(--mono); font-size: 14px;
      padding: 13px 16px; outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--red); }
    .auth-input::placeholder { color: var(--muted); opacity: 0.5; }

    .auth-input-wrap {
      position: relative;
    }
    .auth-input-wrap .auth-input { padding-right: 44px; }
    .auth-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; transition: color 0.2s;
    }
    .auth-eye:hover { color: var(--white); }

    .auth-btn {
      width: 100%; background: var(--red); color: var(--white);
      border: none; font-family: var(--title); font-size: 1rem;
      letter-spacing: 0.15em; padding: 16px;
      cursor: pointer; text-transform: uppercase;
      clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition: background 0.2s; margin-top: 0.5rem;
    }
    .auth-btn:hover { background: var(--red-lit); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      background: rgba(192,25,26,0.12);
      border: 1px solid var(--red-dim);
      color: #ff8080; font-family: var(--mono); font-size: 11px;
      padding: 10px 14px; margin-bottom: 1rem;
      letter-spacing: 0.05em; display: none;
    }
    .auth-error.show { display: block; }

    .auth-success {
      background: rgba(37,211,102,0.1);
      border: 1px solid rgba(37,211,102,0.3);
      color: #5dff9a; font-family: var(--mono); font-size: 11px;
      padding: 10px 14px; margin-bottom: 1rem;
      letter-spacing: 0.05em; display: none;
    }
    .auth-success.show { display: block; }

    .auth-divider {
      text-align: center; margin: 1.25rem 0;
      position: relative;
    }
    .auth-divider::before {
      content: ''; position: absolute;
      top: 50%; left: 0; right: 0; height: 1px;
      background: var(--border);
    }
    .auth-divider span {
      position: relative; background: var(--panel);
      padding: 0 12px; font-family: var(--mono);
      font-size: 9px; color: var(--muted); letter-spacing: 0.2em;
    }

    .auth-footer-link {
      text-align: center; margin-top: 1rem;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
    }
    .auth-footer-link a {
      color: var(--red-lit); text-decoration: none;
      transition: color 0.2s;
    }
    .auth-footer-link a:hover { color: var(--white); }

    .strength-bar {
      height: 3px; background: var(--border); margin-top: 6px;
    }
    .strength-fill {
      height: 100%; width: 0%; transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-family: var(--mono); font-size: 9px; color: var(--muted);
      letter-spacing: 0.1em; margin-top: 4px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase;
      margin: 1.5rem 2.5rem 0; transition: color 0.2s;
    }
    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div>
      <a href="index.html" class="back-link">← Volver a la tienda</a>

      <div class="auth-card">
        <div class="auth-corner-br"></div>
        <div class="auth-corner-bl"></div>

        <div class="auth-header">
          <div class="auth-logo">⛧ <span>HELL</span>WEAR</div>
        </div>

        <!-- TABS -->
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</div>
          <div class="auth-tab" id="tab-registro" onclick="switchTab('registro')">Crear cuenta</div>
        </div>

        <!-- FORM LOGIN -->
        <form class="auth-form active" id="form-login" onsubmit="submitLogin(event)">
          <div class="auth-error" id="err-login"></div>
          <div class="auth-success" id="ok-login"></div>

          <div class="auth-field">
            <label class="auth-label">Correo electrónico</label>
            <input class="auth-input" type="email" id="login-email" placeholder="tu@correo.com" required autocomplete="email"/>
          </div>
          <div class="auth-field">
            <label class="auth-label">Contraseña</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password"/>
              <button type="button" class="auth-eye" onclick="toggleVer('login-pass',this)">👁</button>
            </div>
          </div>

          <button class="auth-btn" type="submit" id="btn-login">Entrar al infierno ⛧</button>

          <div class="auth-footer-link">
            ¿No tienes cuenta? <a href="#" onclick="switchTab('registro');return false;">Créala aquí</a>
          </div>
        </form>

        <!-- FORM REGISTRO -->
        <form class="auth-form" id="form-registro" onsubmit="submitRegistro(event)">
          <div class="auth-error" id="err-registro"></div>
          <div class="auth-success" id="ok-registro"></div>

          <div class="auth-field">
            <label class="auth-label">Nombre completo</label>
            <input class="auth-input" type="text" id="reg-nombre" placeholder="Tu nombre" required autocomplete="name"/>
          </div>
          <div class="auth-field">
            <label class="auth-label">Correo electrónico</label>
            <input class="auth-input" type="email" id="reg-email" placeholder="tu@correo.com" required autocomplete="email"/>
          </div>
          <div class="auth-field">
            <label class="auth-label">Contraseña</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"
                required autocomplete="new-password" oninput="evaluarContraseña(this.value)"/>
              <button type="button" class="auth-eye" onclick="toggleVer('reg-pass',this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
          <div class="auth-field">
            <label class="auth-label">Confirmar contraseña</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="reg-pass2" placeholder="Repite la contraseña"
                required autocomplete="new-password"/>
              <button type="button" class="auth-eye" onclick="toggleVer('reg-pass2',this)">👁</button>
            </div>
          </div>

          <button class="auth-btn" type="submit" id="btn-registro">Unirse al infierno ⛧</button>

          <div class="auth-footer-link">
            ¿Ya tienes cuenta? <a href="#" onclick="switchTab('login');return false;">Inicia sesión</a>
          </div>
        </form>

      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://localhost:3000/api';

    // ── Tabs ────────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab==='login');
      document.getElementById('tab-registro').classList.toggle('active', tab==='registro');
      document.getElementById('form-login').classList.toggle('active', tab==='login');
      document.getElementById('form-registro').classList.toggle('active', tab==='registro');
    }

    // ── Ver/ocultar contraseña ───────────────────────────────
    function toggleVer(inputId, btn) {
      const inp = document.getElementById(inputId);
      if (inp.type === 'password') { inp.type='text'; btn.textContent='🙈'; }
      else { inp.type='password'; btn.textContent='👁'; }
    }

    // ── Fuerza de contraseña ─────────────────────────────────
    function evaluarContraseña(val) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#ff4040','#ff7040','#ffa040','#a0d040','#25d366'];
      const labels = ['Muy débil','Débil','Regular','Buena','Fuerte ⛧'];
      fill.style.width  = (score*20) + '%';
      fill.style.background = colors[score-1] || '#444';
      label.textContent = val.length ? labels[score-1] || '' : '';
      label.style.color = colors[score-1] || 'var(--muted)';
    }

    // ── Error/Success helpers ────────────────────────────────
    function setError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.toggle('show', !!msg);
    }
    function setSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.toggle('show', !!msg);
    }

    // ── Login ────────────────────────────────────────────────
    async function submitLogin(e) {
      e.preventDefault();
      setError('err-login',''); setSuccess('ok-login','');
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Entrando...';

      const email    = document.getElementById('login-email').value;
      const password = document.getElementById('login-pass').value;

      try {
        const r = await fetch(API+'/login', {
          method:'POST', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (data.ok) {
          setSuccess('ok-login', `¡Bienvenido de vuelta, ${data.usuario.nombre}! ⛧`);
          const params = new URLSearchParams(location.search);
          setTimeout(()=> location.href = params.get('redirect') === 'checkout'
            ? 'index.html' : (params.get('redirect') || 'index.html'), 1000);
        } else {
          setError('err-login', data.error || 'Error al iniciar sesión');
          btn.disabled = false; btn.textContent = 'Entrar al infierno ⛧';
        }
      } catch(err) {
        setError('err-login', 'No se puede conectar al servidor. ¿Está corriendo node server.js?');
        btn.disabled = false; btn.textContent = 'Entrar al infierno ⛧';
      }
    }

    // ── Registro ─────────────────────────────────────────────
    async function submitRegistro(e) {
      e.preventDefault();
      setError('err-registro',''); setSuccess('ok-registro','');

      const nombre = document.getElementById('reg-nombre').value;
      const email  = document.getElementById('reg-email').value;
      const pass   = document.getElementById('reg-pass').value;
      const pass2  = document.getElementById('reg-pass2').value;

      if (pass !== pass2) { setError('err-registro','Las contraseñas no coinciden'); return; }
      if (pass.length < 6) { setError('err-registro','La contraseña debe tener al menos 6 caracteres'); return; }

      const btn = document.getElementById('btn-registro');
      btn.disabled = true; btn.textContent = 'Creando cuenta...';

      try {
        const r = await fetch(API+'/registro', {
          method:'POST', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ nombre, email, password: pass })
        });
        const data = await r.json();
        if (data.ok) {
          setSuccess('ok-registro', `¡Cuenta creada! Bienvenido, ${data.usuario.nombre} ⛧`);
          setTimeout(()=> location.href = 'index.html', 1200);
        } else {
          setError('err-registro', data.error || 'Error al crear la cuenta');
          btn.disabled = false; btn.textContent = 'Unirse al infierno ⛧';
        }
      } catch(err) {
        setError('err-registro', 'No se puede conectar al servidor. ¿Está corriendo node server.js?');
        btn.disabled = false; btn.textContent = 'Unirse al infierno ⛧';
      }
    }

    // ── Toast ─────────────────────────────────────────────────
    let _tt;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('show'), 2500);
    }

    // ── Check si ya hay sesión ────────────────────────────────
    fetch(API+'/yo', { credentials:'include' })
      .then(r=>r.json()).then(d=>{
        if (d.usuario) location.href = 'index.html';
      }).catch(()=>{});

    // ── Leer tab desde URL ────────────────────────────────────
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get('tab') === 'registro') switchTab('registro');
  </script>
</body>
</html>
